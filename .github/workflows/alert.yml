name: Ntfy Alert

on:
  workflow_run:
    workflows: ["Daily Data Fetcher"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-alert:
    runs-on: ubuntu-latest
    
    # Führe diesen Job nur aus, wenn der vorherige "Daily Data Fetcher" erfolgreich war
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (22.x)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔔 Run Analysis and Send Ntfy Alert
        # Der Ntfy Topic muss in den GitHub Secrets hinterlegt sein
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node index.js --check-indikator
